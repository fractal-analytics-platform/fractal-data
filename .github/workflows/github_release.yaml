name: Create GitHub release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+[a-c][0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[a-c][0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+alpha[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+beta[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'

jobs:
  build-vizarr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Clone vizarr
        run: git clone https://github.com/BioNGFF/vizarr

      - name: Checkout vizarr commit
        run: |
          cd vizarr
          git checkout 88b6f8128799cd946e93d46278d31a58e392bd62

      - name: Install dependencies
        run: |
          cd vizarr
          pnpm install

      - name: Generate build artifacts
        run: |
          cd vizarr
          pnpm run build

      - name: Generate the package
        run: |
          cd vizarr
          tar -czpf fractal-vizarr-${{ github.ref_name }}.tar.gz dist LICENSE

      - name: Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: vizarr/fractal-vizarr-${{ github.ref_name }}.tar.gz

  build-server:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['20', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Build the non-AWS variant first
      - name: Install dependencies
        run: npm install

      - name: Generate build artifacts
        run: npm run build

      - name: Generate the package
        run: npm pack

      - name: Extract the package
        run: tar -xzf fractal-data-*.tgz

      - name: Repack the package removing parent folder
        run: tar -C package -czf node-${{ matrix.node-version }}-fractal-data-${{ github.ref_name }}.tar.gz dist package.json node_modules LICENSE

      # Save first artifact before cleaning up
      - name: Save non-AWS artifact
        run: mv node-${{ matrix.node-version }}-fractal-data-${{ github.ref_name }}.tar.gz /tmp/

      # Clean up
      - name: Clean up for AWS variant
        # git clean -fdx removes all untracked and ignored files/directories
        # (node_modules, dist, package, *.tgz) to restore the working tree
        # to a pristine post-checkout state. The -e .cache/ flag preserves
        # any local cache directory that tooling may rely on.
        # This ensures the AWS variant is built from scratch, not layered
        # on top of the previous non-AWS build.
        #
        #  !!! WARNING!!! : do not run this command locally when testing
        #  as it will delete untracked files/directories in the repository!
        run: git clean -fdx -e .cache/

      # Build the AWS variant
      - name: Install dependencies with AWS SDK
        run: npm run install:aws

      - name: Rebuild
        run: npm run build

      - name: Add AWS SDK to bundleDependencies and repack
        run: |
          npm pkg set 'bundleDependencies[]'='@aws-sdk/client-s3'
          npm pack

      - name: Extract the AWS package
        run: tar -xzf fractal-data-*.tgz

      - name: Repack the package with AWS SDK
        run: tar -C package -czf node-${{ matrix.node-version }}-fractal-data-with-aws-${{ github.ref_name }}.tar.gz dist package.json node_modules LICENSE

      # Restore non-AWS artifact
      - name: Restore non-AWS artifact
        run: mv /tmp/node-${{ matrix.node-version }}-fractal-data-${{ github.ref_name }}.tar.gz .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            node-${{ matrix.node-version }}-fractal-data-${{ github.ref_name }}.tar.gz
            node-${{ matrix.node-version }}-fractal-data-with-aws-${{ github.ref_name }}.tar.gz
