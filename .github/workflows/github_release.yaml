name: Create GitHub release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+[a-c][0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[a-c][0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+alpha[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+beta[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'

jobs:
  build-vizarr:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm install -g pnpm@9
      - run: git clone https://github.com/BioNGFF/vizarr
      - name: Checkout vizarr commit
        run: |
          cd vizarr
          git checkout 88b6f8128799cd946e93d46278d31a58e392bd62
      - name: Install dependencies
        run: |
          cd vizarr
          pnpm install
      - name: Generate build artifacts
        run: |
          cd vizarr
          pnpm run build
      - name: Generate the package
        run: |
          cd vizarr
          tar -czpf "fractal-vizarr-${GH_REF_NAME}.tar.gz" dist LICENSE
        env:
          GH_REF_NAME: ${{ github.ref_name }}

      - name: Release
        run: gh release create "vizarr-${GH_REF_NAME}" "vizarr/fractal-vizarr-${GH_REF_NAME}.tar.gz"
        env:
          GH_REF_NAME: ${{ github.ref_name }}

  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        node-version: ['20', '24']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      # Build the non-AWS variant first
      - run: npm install
      - run: npm run build
      - run: npm pack
      - run: tar -xzf fractal-data-*.tgz

      - name: Repack the package removing parent folder
        run: tar -C package -czf "node-${{ matrix.node-version }}-fractal-data-${GH_REF_NAME}.tar.gz" dist package.json node_modules LICENSE
        env:
          GH_REF_NAME: ${{ github.ref_name }}


      # Save first artifact before cleaning up
      - name: Save non-AWS artifact
        run: mv "node-${{ matrix.node-version }}-fractal-data-${GH_REF_NAME}.tar.gz" /tmp/
        env:
          GH_REF_NAME: ${{ github.ref_name }}

      # Clean up
      - name: Clean up for AWS variant
        # git clean -fdx removes all untracked and ignored files/directories
        # (node_modules, dist, package, *.tgz) to restore the working tree
        # to a pristine post-checkout state. The -e .cache/ flag preserves
        # any local cache directory that tooling may rely on.
        # This ensures the AWS variant is built from scratch, not layered
        # on top of the previous non-AWS build.
        #
        #  !!! WARNING!!! : do not run this command locally when testing
        #  as it will delete untracked files/directories in the repository!
        run: git clean -fdx -e .cache/

      # Build the AWS variant
      - run: npm run install:aws
      - run: npm run build

      - name: Add AWS SDK to bundleDependencies and repack
        run: |
          npm pkg set 'bundleDependencies[]'='@aws-sdk/client-s3'
          npm pack

      - run: tar -xzf fractal-data-*.tgz

      - name: Repack the package with AWS SDK
        run: tar -C package -czf "node-${{ matrix.node-version }}-fractal-data-with-aws-${GH_REF_NAME}.tar.gz" dist package.json node_modules LICENSE
        env:
          GH_REF_NAME: ${{ github.ref_name }}


      # Restore non-AWS artifact
      - name: Restore non-AWS artifact
        run: mv "/tmp/node-${{ matrix.node-version }}-fractal-data-${GH_REF_NAME}.tar.gz" .
        env:
          GH_REF_NAME: ${{ github.ref_name }}

      - name: Release
        run: gh release create "${GH_REF_NAME}" "node-${{ matrix.node-version }}-fractal-data-${GH_REF_NAME}.tar.gz" "node-${{ matrix.node-version }}-fractal-data-with-aws-${GH_REF_NAME}.tar.gz"
        env:
          GH_REF_NAME: ${{ github.ref_name }}
